services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sessionfs
      POSTGRES_PASSWORD: sessionfs
      POSTGRES_DB: sessionfs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      SFS_DATABASE_URL: postgresql+asyncpg://sessionfs:sessionfs@db:5432/sessionfs
      SFS_BLOB_STORE_TYPE: local
      SFS_BLOB_STORE_LOCAL_PATH: /data/blobs
      SFS_DASHBOARD_DIR: /app/static
      SFS_CORS_ORIGINS: '["http://localhost:5173"]'
    volumes:
      - blobdata:/data/blobs
      - ./dashboard/dist:/app/static:ro
    depends_on:
      - db

volumes:
  pgdata:
  blobdata:
