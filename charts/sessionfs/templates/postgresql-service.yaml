{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sessionfs.postgresql.fullname" . }}
  labels:
    {{- include "sessionfs.componentLabels" (list . "postgresql") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: tcp-postgresql
      protocol: TCP
      name: tcp-postgresql
  selector:
    {{- include "sessionfs.componentSelectorLabels" (list . "postgresql") | nindent 4 }}
{{- end }}
