{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sessionfs.fullname" . }}-mcp
  labels:
    {{- include "sessionfs.componentLabels" (list . "mcp") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sessionfs.componentSelectorLabels" (list . "mcp") | nindent 4 }}
{{- end }}
