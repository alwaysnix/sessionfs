apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sessionfs.fullname" . }}-api
  labels:
    {{- include "sessionfs.componentLabels" (list . "api") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sessionfs.componentSelectorLabels" (list . "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sessionfs.componentSelectorLabels" (list . "api") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/api-configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      {{- include "sessionfs.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sessionfs.serviceAccountName" . }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.license.key }}
      initContainers:
        - name: license-check
          image: curlimages/curl:8.12.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
          command: ["sh", "-c"]
          args:
            - |
              {{- if eq .Values.license.mode "local" }}
              VALIDATE_URL="http://{{ include "sessionfs.fullname" . }}-api:{{ .Values.api.service.port }}/api/v1/helm/validate"
              {{- else }}
              VALIDATE_URL="{{ .Values.license.server | default "https://api.sessionfs.dev" }}/api/v1/helm/validate"
              {{- end }}

              ATTEMPT=0
              MAX_RETRIES=5
              SUCCESS=false

              while [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; do
                ATTEMPT=$((ATTEMPT + 1))
                echo "License validation attempt $ATTEMPT/$MAX_RETRIES..."

                RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$VALIDATE_URL" \
                  -H "Content-Type: application/json" \
                  -H "X-Client-Version: {{ .Chart.AppVersion }}" \
                  -d "{\"license_key\":\"$(SFS_LICENSE_KEY)\"}" 2>/dev/null) || true

                HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                BODY=$(echo "$RESPONSE" | sed '$d')

                if [ "$HTTP_CODE" = "200" ]; then
                  echo "{\"validated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"response\":$BODY}" > /etc/sessionfs/license.json
                  echo "License validated successfully"
                  SUCCESS=true
                  break
                fi

                echo "Attempt $ATTEMPT failed (HTTP $HTTP_CODE): $BODY"
                if [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; then
                  sleep 5
                fi
              done

              if [ "$SUCCESS" = "false" ]; then
                # Cache fallback: use cached license if less than 7 days old
                if [ -f /etc/sessionfs/license.json ]; then
                  CACHE_AGE=$(( $(date +%s) - $(date -r /etc/sessionfs/license.json +%s 2>/dev/null || echo 0) ))
                  MAX_AGE=$((7 * 86400))
                  if [ "$CACHE_AGE" -lt "$MAX_AGE" ]; then
                    echo "Validation server unreachable, using cached license (age: ${CACHE_AGE}s)"
                    exit 0
                  else
                    echo "Cached license expired (age: ${CACHE_AGE}s, max: ${MAX_AGE}s)"
                  fi
                fi
                echo "License validation failed after $MAX_RETRIES attempts and no valid cache"
                exit 1
              fi
          env:
            - name: SFS_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sessionfs.fullname" . }}-license
                  key: license-key
          volumeMounts:
            - name: license-volume
              mountPath: /etc/sessionfs
      {{- end }}
      containers:
        - name: api
          image: {{ include "sessionfs.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "sessionfs.fullname" . }}-api
          env:
            {{- include "sessionfs.databaseEnv" . | nindent 12 }}
            - name: SFS_DATABASE_URL
              value: {{ include "sessionfs.databaseUrl" . | quote }}
            {{- if .Values.security.existingSecret }}
            - name: SFS_VERIFICATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.security.existingSecret }}
                  key: {{ .Values.security.secretKeys.verificationSecret }}
            - name: SFS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.security.existingSecret }}
                  key: {{ .Values.security.secretKeys.encryptionKey }}
            {{- else }}
            - name: SFS_VERIFICATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sessionfs.secretsName" . }}
                  key: verification-secret
            - name: SFS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "sessionfs.secretsName" . }}
                  key: encryption-key
            {{- end }}
            - name: SFS_EMAIL_PROVIDER
              value: {{ .Values.email.provider | quote }}
            - name: SFS_EMAIL_FROM
              value: {{ .Values.email.fromAddress | quote }}
            {{- if or .Values.email.resend.apiKey .Values.email.resend.existingSecret }}
            - name: SFS_RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.email.resend.existingSecret | default (include "sessionfs.secretsName" .) }}
                  key: {{ .Values.email.resend.secretKey | default "resend-api-key" }}
            {{- end }}
            {{- if .Values.email.smtp.host }}
            - name: SFS_SMTP_HOST
              value: {{ .Values.email.smtp.host | quote }}
            - name: SFS_SMTP_PORT
              value: {{ .Values.email.smtp.port | quote }}
            - name: SFS_SMTP_TLS
              value: {{ .Values.email.smtp.tls | quote }}
            - name: SFS_SMTP_SSL
              value: {{ .Values.email.smtp.ssl | quote }}
            - name: SFS_SMTP_VERIFY_SSL
              value: {{ .Values.email.smtp.verifySSL | quote }}
            {{- if .Values.email.smtp.existingSecret }}
            - name: SFS_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.email.smtp.existingSecret }}
                  key: {{ .Values.email.smtp.secretKeyUsername }}
            - name: SFS_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.email.smtp.existingSecret }}
                  key: {{ .Values.email.smtp.secretKeyPassword }}
            {{- else if .Values.email.smtp.username }}
            - name: SFS_SMTP_USERNAME
              value: {{ .Values.email.smtp.username | quote }}
            - name: SFS_SMTP_PASSWORD
              value: {{ .Values.email.smtp.password | quote }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.storage.type "s3" }}
            - name: SFS_BLOB_STORE_TYPE
              value: "s3"
            - name: SFS_S3_BUCKET
              value: {{ .Values.storage.s3.bucket | quote }}
            - name: SFS_S3_REGION
              value: {{ .Values.storage.s3.region | quote }}
            {{- if .Values.storage.s3.prefix }}
            - name: SFS_S3_PREFIX
              value: {{ .Values.storage.s3.prefix | quote }}
            {{- end }}
            {{- if .Values.storage.s3.endpointUrl }}
            - name: SFS_S3_ENDPOINT_URL
              value: {{ .Values.storage.s3.endpointUrl | quote }}
            {{- end }}
            {{- if .Values.storage.s3.existingSecret }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.s3.existingSecret }}
                  key: {{ .Values.storage.s3.secretKeys.accessKeyId }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.s3.existingSecret }}
                  key: {{ .Values.storage.s3.secretKeys.secretAccessKey }}
            {{- end }}
            {{- else if eq .Values.storage.type "gcs" }}
            - name: SFS_BLOB_STORE_TYPE
              value: "gcs"
            - name: SFS_GCS_BUCKET
              value: {{ .Values.storage.gcs.bucket | quote }}
            {{- if .Values.storage.gcs.existingSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcs/credentials.json
            {{- end }}
            {{- else }}
            - name: SFS_BLOB_STORE_TYPE
              value: "local"
            - name: SFS_BLOB_STORE_LOCAL_PATH
              value: {{ .Values.storage.local.path | quote }}
            {{- end }}
            {{- range $key, $value := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- with .Values.api.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and (eq .Values.storage.type "local") .Values.storage.local.persistence.enabled }}
          volumeMounts:
            - name: blob-storage
              mountPath: {{ .Values.storage.local.path }}
          {{- end }}
          {{- if and (eq .Values.storage.type "gcs") .Values.storage.gcs.existingSecret }}
          volumeMounts:
            - name: gcs-credentials
              mountPath: /var/secrets/gcs
              readOnly: true
          {{- end }}
      volumes:
        {{- if .Values.license.key }}
        - name: license-volume
          emptyDir: {}
        {{- end }}
        {{- if and (eq .Values.storage.type "local") .Values.storage.local.persistence.enabled }}
        - name: blob-storage
          persistentVolumeClaim:
            claimName: {{ include "sessionfs.fullname" . }}-blob-storage
        {{- end }}
        {{- if and (eq .Values.storage.type "gcs") .Values.storage.gcs.existingSecret }}
        - name: gcs-credentials
          secret:
            secretName: {{ .Values.storage.gcs.existingSecret }}
        {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
