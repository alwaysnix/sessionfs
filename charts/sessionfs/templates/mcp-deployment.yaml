{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sessionfs.fullname" . }}-mcp
  labels:
    {{- include "sessionfs.componentLabels" (list . "mcp") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.mcp.autoscaling.enabled }}
  replicas: {{ .Values.mcp.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sessionfs.componentSelectorLabels" (list . "mcp") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sessionfs.componentSelectorLabels" (list . "mcp") | nindent 8 }}
    spec:
      {{- include "sessionfs.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sessionfs.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: mcp
          image: {{ include "sessionfs.mcp.image" . }}
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.service.port }}
              protocol: TCP
          env:
            - name: SFS_API_URL
              value: "http://{{ include "sessionfs.fullname" . }}-api:{{ .Values.api.service.port }}"
            - name: PORT
              value: {{ .Values.mcp.service.port | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- with .Values.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
