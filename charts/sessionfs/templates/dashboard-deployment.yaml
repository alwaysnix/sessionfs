{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sessionfs.fullname" . }}-dashboard
  labels:
    {{- include "sessionfs.componentLabels" (list . "dashboard") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "sessionfs.componentSelectorLabels" (list . "dashboard") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sessionfs.componentSelectorLabels" (list . "dashboard") | nindent 8 }}
    spec:
      {{- include "sessionfs.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "sessionfs.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: false
        fsGroup: 101
      containers:
        - name: dashboard
          image: {{ include "sessionfs.dashboard.image" . }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
