apiVersion: v1
kind: Service
metadata:
  name: {{ include "sessionfs.fullname" . }}-api
  labels:
    {{- include "sessionfs.componentLabels" (list . "api") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sessionfs.componentSelectorLabels" (list . "api") | nindent 4 }}
