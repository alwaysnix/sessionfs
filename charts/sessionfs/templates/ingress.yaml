{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sessionfs.fullname" . }}
  labels:
    {{- include "sessionfs.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ .paths.api }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "sessionfs.fullname" $ }}-api
                port:
                  name: http
          {{- if $.Values.mcp.enabled }}
          - path: {{ .paths.mcp }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "sessionfs.fullname" $ }}-mcp
                port:
                  name: http
          {{- end }}
          {{- if $.Values.dashboard.enabled }}
          - path: {{ .paths.dashboard }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "sessionfs.fullname" $ }}-dashboard
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
