apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sessionfs.fullname" . }}-api
  labels:
    {{- include "sessionfs.componentLabels" (list . "api") | nindent 4 }}
data:
  SFS_LOG_LEVEL: {{ .Values.api.logLevel | quote }}
  SFS_HOST: "0.0.0.0"
  SFS_PORT: {{ .Values.api.service.port | quote }}
  SFS_RATE_LIMIT_PER_MINUTE: {{ .Values.api.rateLimitPerMinute | quote }}
  {{- if .Values.api.corsOrigins }}
  SFS_CORS_ORIGINS: {{ .Values.api.corsOrigins | quote }}
  {{- end }}
