{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sessionfs.fullname" . }}-dashboard-nginx
  labels:
    {{- include "sessionfs.componentLabels" (list . "dashboard") | nindent 4 }}
data:
  default.conf: |
    client_max_body_size {{ .Values.dashboard.clientMaxBodySize | default "100m" }};

    server {
      listen 8080;
      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://{{ include "sessionfs.fullname" . }}-api:{{ .Values.api.service.port }}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size {{ .Values.dashboard.clientMaxBodySize | default "100m" }};
      }

      {{- if $.Values.mcp.enabled }}
      location /mcp/ {
        proxy_pass http://{{ include "sessionfs.fullname" . }}-mcp:{{ .Values.mcp.service.port }}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
      }
      {{- end }}

      location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
      }
    }
{{- end }}
