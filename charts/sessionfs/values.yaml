## Global settings
global:
  imageRegistry: ghcr.io/sessionfs
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  storageClass: ""

## API Server
api:
  replicaCount: 2
  image:
    repository: sessionfs-api
    tag: ""  # defaults to appVersion
    pullPolicy: ""  # defaults to global.imagePullPolicy
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}
  env: {}
  podSecurityContext:
    runAsNonRoot: false
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  logLevel: "INFO"
  corsOrigins: ""
  rateLimitPerMinute: 120  # Requests per minute per API key. Set to 0 to disable.

## MCP Server
mcp:
  enabled: true
  replicaCount: 1
  podSecurityContext:
    runAsNonRoot: false
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  image:
    repository: sessionfs-mcp
    tag: ""
    pullPolicy: ""
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Web Dashboard
dashboard:
  enabled: true
  replicaCount: 1
  podSecurityContext:
    runAsNonRoot: false
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  image:
    repository: sessionfs-dashboard
    tag: ""
    pullPolicy: ""
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  clientMaxBodySize: "100m"  # nginx client_max_body_size for sync uploads
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Built-in PostgreSQL (disable for external database)
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    username: sessionfs
    password: ""  # auto-generated if empty
    database: sessionfs
    existingSecret: ""
    secretKeys:
      usernameKey: username
      passwordKey: password
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  nodeSelector: {}
  tolerations: []
  affinity: {}

## External Database (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  username: sessionfs
  password: ""
  database: sessionfs
  # NOTE: sslMode removed — asyncpg negotiates SSL automatically for RDS/Cloud SQL.
  # Do NOT add ?sslmode=require to the URL. See docs/self-hosted.md for details.
  existingSecret: ""
  secretKey: database-url

## Blob Storage
storage:
  type: local  # local, s3, or gcs
  local:
    path: /data/blobs
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
  s3:
    bucket: ""              # Bucket name only — no slashes
    region: us-east-1
    prefix: ""              # Optional key prefix (e.g. "sessionfs/")
    endpointUrl: ""
    existingSecret: ""
    secretKeys:
      accessKeyId: aws-access-key-id
      secretAccessKey: aws-secret-access-key
  gcs:
    bucket: ""
    existingSecret: ""
    secretKey: gcs-credentials-json

## Ingress
ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: sessionfs.local
  tls: []

## Email
email:
  # Provider: "resend", "smtp", "none", or "auto" (default)
  provider: "auto"
  fromAddress: "noreply@sessionfs.example.com"
  resend:
    apiKey: ""
    existingSecret: ""
    secretKey: resend-api-key
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    existingSecret: ""
    secretKeyUsername: username
    secretKeyPassword: password
    tls: true
    ssl: false
    verifySSL: true    # Set to false for internal relays with self-signed certs

## Security
security:
  verificationSecret: ""
  encryptionKey: ""
  existingSecret: ""
  secretKeys:
    verificationSecret: verification-secret
    encryptionKey: encryption-key
  networkPolicies:
    enabled: false
  podSecurityStandards:
    enforce: "baseline"

## Database Migrations
migrations:
  enabled: true
  image:
    repository: sessionfs-api
    tag: ""
  backoffLimit: 3
  podSecurityContext:
    runAsNonRoot: false
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

## Monitoring
monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

## Service Account
serviceAccount:
  create: true
  name: ""
  annotations: {}

## Common labels added to all resources
commonLabels: {}

## Common annotations added to all resources
commonAnnotations: {}
