name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/sessionfs/server/**'
      - 'src/sessionfs/utils/**'
      - 'Dockerfile'
      - 'alembic.ini'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_ID: sessionfs-prod
  REGION: us-central1
  SERVICE: sessionfs-api
  IMAGE: us-central1-docker.pkg.dev/sessionfs-prod/sessionfs/sessionfs-api
  WIF_PROVIDER: projects/391749893806/locations/global/workloadIdentityPools/github/providers/github-actions
  SERVICE_ACCOUNT: deployer@sessionfs-prod.iam.gserviceaccount.com

jobs:
  # ---- Test ----
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ---- Build, Scan, Push ----
  build:
    name: Build & Scan
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            -t "${{ steps.meta.outputs.image }}" \
            -t "${{ env.IMAGE }}:latest" \
            .

      # Vulnerability scan with Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image
        id: push
        run: |
          docker push "${{ steps.meta.outputs.image }}"
          docker push "${{ env.IMAGE }}:latest"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.image }}" | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  # ---- Migrate ----
  migrate:
    name: Run Migrations
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Run Alembic migrations
        run: |
          gcloud run jobs execute sessionfs-migrate \
            --region ${{ env.REGION }} \
            --wait \
            --args="upgrade,head"

  # ---- Deploy ----
  deploy:
    name: Deploy
    needs: [build, migrate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --image "${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}" \
            --region ${{ env.REGION }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format="value(status.url)")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status ${STATUS}"
            exit 1
          fi
          echo "Deployment healthy at ${URL}"
