name: Publish Container Images

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (tag or branch)"
        required: false
        default: "main"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sessionfs
  # Unified ref: workflow_run uses the triggering branch/tag;
  # workflow_dispatch uses the explicit input (default: main).
  BUILD_REF: ${{ github.event.workflow_run.head_branch || github.event.inputs.ref || 'main' }}

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    # Run on: successful Release workflow OR manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Get version
        id: version
        run: |
          REF="${{ env.BUILD_REF }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sessionfs-api:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sessionfs-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/sessionfs-api:${{ steps.version.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  build-mcp:
    name: Build MCP Image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Get version
        id: version
        run: |
          REF="${{ env.BUILD_REF }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MCP image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sessionfs-mcp:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sessionfs-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan MCP image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/sessionfs-mcp:${{ steps.version.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Get version
        id: version
        run: |
          REF="${{ env.BUILD_REF }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://api.sessionfs.dev
          tags: |
            ${{ env.IMAGE_PREFIX }}/sessionfs-dashboard:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sessionfs-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan Dashboard image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/sessionfs-dashboard:${{ steps.version.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
