name: Publish Container Images

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sessionfs

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REF_NAME: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sessionfs-api:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sessionfs-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/sessionfs-api:${{ steps.version.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'  # Don't fail release, just report

  build-mcp:
    name: Build MCP Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REF_NAME: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MCP image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sessionfs-mcp:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sessionfs-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan MCP image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/sessionfs-mcp:${{ steps.version.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REF_NAME: ${{ github.event.workflow_run.head_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://api.sessionfs.dev
          tags: |
            ${{ env.IMAGE_PREFIX }}/sessionfs-dashboard:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sessionfs-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan Dashboard image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/sessionfs-dashboard:${{ steps.version.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
