name: Deploy MCP Server

on:
  push:
    branches: [main]
    paths:
      - 'src/sessionfs/mcp/**'
      - 'Dockerfile.mcp'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: sessionfs-prod
  REGION: us-central1
  SERVICE: sessionfs-mcp
  IMAGE: us-central1-docker.pkg.dev/sessionfs-prod/sessionfs/sessionfs-mcp
  WIF_PROVIDER: projects/391749893806/locations/global/workloadIdentityPools/github/providers/github-actions
  SERVICE_ACCOUNT: deployer@sessionfs-prod.iam.gserviceaccount.com

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/test_mcp_*.py -v --tb=short

  build-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          docker build -f Dockerfile.mcp \
            -t "${{ env.IMAGE }}:${{ github.sha }}" \
            -t "${{ env.IMAGE }}:latest" \
            .
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --image "${{ env.IMAGE }}:${{ needs.build-push.outputs.image_tag }}" \
            --region ${{ env.REGION }}

      - name: Verify
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format="value(status.url)")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: ${STATUS}"
            exit 1
          fi
          echo "MCP server healthy at ${URL}"
