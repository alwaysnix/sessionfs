name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  security-events: write
  issues: write

jobs:
  pip-audit:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[server,dev]"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        id: audit
        run: |
          pip-audit --format=json --output=pip-audit.json || echo "vulnerabilities_found=true" >> "$GITHUB_OUTPUT"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-results
          path: pip-audit.json

      - name: Create issue on vulnerabilities
        if: steps.audit.outputs.vulnerabilities_found == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('pip-audit.json', 'utf8'));
            const vulns = audit.dependencies
              ? audit.dependencies.filter(d => d.vulns && d.vulns.length > 0)
              : [];

            if (vulns.length === 0) return;

            let body = '## Dependency Vulnerabilities Found\n\n';
            body += `**Scan date:** ${new Date().toISOString()}\n\n`;
            body += '| Package | Version | Vulnerability | Fix |\n';
            body += '|---------|---------|---------------|-----|\n';

            for (const dep of vulns) {
              for (const v of dep.vulns) {
                body += `| ${dep.name} | ${dep.version} | ${v.id} | ${v.fix_versions ? v.fix_versions.join(', ') : 'N/A'} |\n`;
              }
            }

            body += '\n---\n*Created by Security Scan workflow*';

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
              per_page: 10,
            });

            const duplicate = existing.data.find(i =>
              i.title.includes('Dependency Vulnerabilities')
            );

            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Security: Dependency Vulnerabilities Found (${new Date().toISOString().split('T')[0]})`,
                body: body,
                labels: ['security', 'automated'],
              });
            }

  trivy-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Use setup-trivy + raw trivy binary instead of aquasecurity/trivy-action
      # because the action's `severity:` input doesn't properly filter exit-code
      # for the `config` scan type — it exits 1 on any finding regardless of
      # severity. Running trivy directly honors --severity correctly.
      - uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.69.3

      # Render the Helm chart so the misconfig scan sees the actual rendered
      # Kubernetes manifests instead of raw `{{- with .Values }}` templates
      # (which Trivy cannot evaluate and which produce 40+ false positives).
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.1

      - name: Render Helm chart
        run: |
          mkdir -p rendered
          helm template sessionfs charts/sessionfs \
            --namespace sessionfs \
            > rendered/chart.yaml

      - name: Trivy secret scan (filesystem)
        run: |
          trivy fs . \
            --scanners secret \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format sarif \
            --output trivy-secrets.sarif \
            --skip-dirs node_modules \
            --skip-dirs dashboard/node_modules \
            --skip-dirs site/node_modules \
            --skip-dirs .venv

      - name: Trivy misconfig scan (rendered chart + Dockerfiles)
        run: |
          trivy config . \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format sarif \
            --output trivy-misconfig.sarif \
            --skip-dirs charts/sessionfs/templates \
            --skip-dirs node_modules \
            --skip-dirs dashboard/node_modules \
            --skip-dirs site/node_modules

      - name: Upload Trivy secret scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Upload Trivy misconfig SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-misconfig.sarif
          category: trivy-misconfig

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/

  bandit:
    name: Python Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        id: bandit
        run: |
          bandit -r src/sessionfs/ -f json -o bandit.json -ll || echo "issues_found=true" >> "$GITHUB_OUTPUT"

      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-results
          path: bandit.json

      - name: Fail on HIGH severity
        if: steps.bandit.outputs.issues_found == 'true'
        run: |
          echo "::error::Bandit found HIGH or above severity issues. See bandit-results artifact."
          python3 -c "
          import json, sys
          data = json.load(open('bandit.json'))
          high = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          if high:
              for r in high:
                  print(f\"  {r['filename']}:{r['line_number']} - {r['issue_text']} [{r['test_id']}]\")
              sys.exit(1)
          print('No HIGH severity issues (only MEDIUM found).')
          "
