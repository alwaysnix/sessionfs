name: Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read
  security-events: write
  issues: write

jobs:
  pip-audit:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[server,dev]"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        id: audit
        run: |
          pip-audit --format=json --output=pip-audit.json || echo "vulnerabilities_found=true" >> "$GITHUB_OUTPUT"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-results
          path: pip-audit.json

      - name: Create issue on vulnerabilities
        if: steps.audit.outputs.vulnerabilities_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('pip-audit.json', 'utf8'));
            const vulns = audit.dependencies
              ? audit.dependencies.filter(d => d.vulns && d.vulns.length > 0)
              : [];

            if (vulns.length === 0) return;

            let body = '## Dependency Vulnerabilities Found\n\n';
            body += `**Scan date:** ${new Date().toISOString()}\n\n`;
            body += '| Package | Version | Vulnerability | Fix |\n';
            body += '|---------|---------|---------------|-----|\n';

            for (const dep of vulns) {
              for (const v of dep.vulns) {
                body += `| ${dep.name} | ${dep.version} | ${v.id} | ${v.fix_versions ? v.fix_versions.join(', ') : 'N/A'} |\n`;
              }
            }

            body += '\n---\n*Created by Security Scan workflow*';

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
              per_page: 10,
            });

            const duplicate = existing.data.find(i =>
              i.title.includes('Dependency Vulnerabilities')
            );

            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Security: Dependency Vulnerabilities Found (${new Date().toISOString().split('T')[0]})`,
                body: body,
                labels: ['security', 'automated'],
              });
            }

  trivy-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Secret scanning runs against the raw working tree so secrets in
      # template files, env examples, etc. are still caught.
      - name: Run Trivy secret scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-secrets.sarif
          exit-code: 1

      # Trivy cannot evaluate Helm templates (`{{- with .Values... }}` is
      # invisible to it), so we render the chart first and then run the
      # misconfig scan against the rendered Kubernetes manifests plus the
      # Dockerfiles. This eliminates Helm false positives while still
      # catching real issues in the deployed manifests and images.
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Render Helm chart
        run: |
          mkdir -p rendered
          helm template sessionfs charts/sessionfs \
            --namespace sessionfs \
            > rendered/chart.yaml

      - name: Run Trivy misconfig scan (rendered chart + Dockerfiles)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          scanners: misconfig
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-misconfig.sarif
          exit-code: 1
          skip-dirs: charts/sessionfs/templates

      - name: Upload Trivy secret scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Upload Trivy misconfig SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-misconfig.sarif
          category: trivy-misconfig

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/

  bandit:
    name: Python Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        id: bandit
        run: |
          bandit -r src/sessionfs/ -f json -o bandit.json -ll || echo "issues_found=true" >> "$GITHUB_OUTPUT"

      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-results
          path: bandit.json

      - name: Fail on HIGH severity
        if: steps.bandit.outputs.issues_found == 'true'
        run: |
          echo "::error::Bandit found HIGH or above severity issues. See bandit-results artifact."
          python3 -c "
          import json, sys
          data = json.load(open('bandit.json'))
          high = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          if high:
              for r in high:
                  print(f\"  {r['filename']}:{r['line_number']} - {r['issue_text']} [{r['test_id']}]\")
              sys.exit(1)
          print('No HIGH severity issues (only MEDIUM found).')
          "
